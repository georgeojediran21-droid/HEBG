<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login - HEBG Ministry</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;background:#f8fafc;}
.login-shell{min-height:100vh;padding:70px 15px;display:flex;align-items:center;}
.login-card{border:none;border-radius:24px;box-shadow:0 18px 50px rgba(10,25,49,.12);}
.login-container{max-width:900px;}
.login-image {
    background: linear-gradient(rgba(6, 78, 59, 0.4), rgba(6, 78, 59, 0.4)), 
                url('/uploads/images/hero-worship.svg');
    background-size: cover;
    background-position: center;
    border-radius: 24px 0 0 24px;
    min-height: 400px;
}
@media (max-width: 768px) {
    .login-image { border-radius: 24px 24px 0 0; min-height: 200px; }
}
/* Inline reset overlay */
#resetOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);z-index:9999}
#resetOverlay .panel{max-width:520px;padding:20px;border-radius:12px}
#resetOverlay label{font-weight:700;font-size:.9rem}
#resetOverlay .token-box{word-break:break-all;background:#f8f9fa;padding:8px;border-radius:6px;border:1px solid #e6eef6;font-family:monospace}
</style>
<link href="style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow sticky-top fixed-top">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">HEBG Ministry</a>
<div class="ms-auto d-flex gap-2">
<a class="btn btn-outline-light btn-sm" href="join.html">Register</a>
<a class="btn btn-success btn-sm" href="index.html">Home</a>
</div>
</div>
</nav>
 
<!-- Password Reset Overlay (Now part of the static DOM for better clarity) -->
<div id="resetOverlay" class="overlay-container" style="display:none; position:fixed; inset:0; align-items:center; justify-content:center; background:rgba(0,0,0,.45); z-index:9999">
    <div class="card panel mx-3 shadow-lg" style="max-width:520px; border-radius:12px; border:none; background: white;">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-2">Reset Password</h5>
            <p class="text-muted small mb-3">Enter your account email to receive a one-time token (Development mode: the token will be shown here).</p>
            
            <div id="resetStatus" class="alert d-none small py-2 mb-3"></div>

            <div class="mb-3">
                <label for="resetEmail" class="form-label fw-bold small">Account Email</label>
                <input id="resetEmail" class="form-control" type="email" placeholder="you@example.com">
            </div>
            <div class="mb-3 text-end">
                <button id="requestTokenBtn" class="btn btn-outline-secondary btn-sm">Request Token</button>
            </div>
            
            <div id="resetArea" style="display:none">
                <hr class="my-3">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Your Reset Token</label>
                    <div id="resetToken" class="token-box mt-1 p-2 bg-light border rounded small font-monospace text-center" style="word-break:break-all;">-</div>
                </div>
                <div class="mb-3">
                    <label for="resetPassword" class="form-label fw-bold small">New Password</label>
                    <input id="resetPassword" class="form-control" type="password" placeholder="Min 8 characters">
                </div>
                <div class="mb-3">
                    <label for="resetPasswordConfirm" class="form-label fw-bold small">Confirm New Password</label>
                    <input id="resetPasswordConfirm" class="form-control" type="password" placeholder="Repeat new password">
                </div>
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button id="cancelResetBtn" class="btn btn-light btn-sm">Cancel</button>
                    <button id="submitResetBtn" class="btn btn-success btn-sm">Update Password</button>
                </div>
            </div>
        </div>
    </div>
</div>

<main class="login-shell">
<div class="container login-container">
<div class="card login-card overflow-hidden">
    <div class="row g-0">
        <div class="col-md-5 login-image"></div>
        <div class="col-md-7 p-4 p-md-5 bg-white">
            <h1 class="h3 fw-bold mb-2">Member Login</h1>
            <p class="text-muted mb-4">Sign in with the account you created during ministry registration.</p>
            <form id="memberLoginForm" class="row g-3">
            <div id="loginFeedback" class="alert d-none" role="alert"></div>
            <div class="col-12">
            <label class="form-label fw-bold" for="email">Email</label>
            <input class="form-control form-control-lg shadow-sm" id="email" name="email" type="email" required autocomplete="email">
            </div>
            <div class="col-12">
            <label class="form-label fw-bold" for="password">Password</label>
            <input class="form-control form-control-lg shadow-sm" id="password" name="password" type="password" required autocomplete="current-password">
                        <div class="d-flex justify-content-end mt-2"><a href="#" id="forgotPasswordLink" class="small">Forgot password?</a></div>
            <div class="col-12 pt-3">
            <button class="btn btn-success btn-lg w-100 shadow" type="submit">Login</button>
            </div>
            </form>
        </div>
    </div>
</div>
</div>
</main>

<script>
const apiBase = window.location.origin === 'http://localhost:3000' ? '' : 'http://localhost:3000';
const form = document.getElementById('memberLoginForm');
// Minimal API helper that requires JSON responses
async function api(url, options = {}){
    const resp = await fetch(`${apiBase}${url}`, options).catch(()=>{throw new Error('Cannot reach the backend. Make sure Node is running with: node server.js')});
    const ct = resp.headers.get('content-type')||'';
    if(!ct.includes('application/json')) throw new Error('Unexpected non-JSON response from server.');
    const data = await resp.json().catch(()=>({}));
    if(!resp.ok) throw new Error(data.message||'Request failed');
    return data;
}
const feedback = document.getElementById('loginFeedback');

const forgotPasswordLink = document.getElementById('forgotPasswordLink');
function showFeedback(message, type = 'success') {
    feedback.className = `alert alert-${type}`;
    feedback.textContent = message;
}

form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const button = form.querySelector('button[type="submit"]');
    button.disabled = true;
    button.textContent = 'Logging in...';

    try {
        const response = await fetch(`${apiBase}/api/user/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(Object.fromEntries(new FormData(form)))
        });
        const data = await response.json();

        if (!response.ok) throw new Error(data.message || 'Login failed.');

        localStorage.setItem('hebgMemberToken', data.token);
        window.location.href = 'member.html';
    } catch (error) {
        showFeedback(error.message || 'Cannot reach the backend. Make sure Node is running.', 'danger');
    } finally {
        button.disabled = false;
        button.textContent = 'Login';
    }
});

const resetOverlay = document.getElementById('resetOverlay');
const requestTokenBtn = document.getElementById('requestTokenBtn');
const resetArea = document.getElementById('resetArea');
const resetTokenBox = document.getElementById('resetToken');
const resetEmail = document.getElementById('resetEmail');
const resetPassword = document.getElementById('resetPassword');
const resetPasswordConfirm = document.getElementById('resetPasswordConfirm');
const cancelResetBtn = document.getElementById('cancelResetBtn');
const submitResetBtn = document.getElementById('submitResetBtn');

function showResetOverlay(){ resetOverlay.style.display = 'flex'; resetArea.style.display='none'; resetTokenBox.textContent='-'; resetEmail.value=''; }
function hideResetOverlay(){ resetOverlay.style.display='none'; }

forgotPasswordLink?.addEventListener('click', (e)=>{ e.preventDefault(); showResetOverlay(); });

requestTokenBtn?.addEventListener('click', async (e)=>{
    e.preventDefault();
    try{
        const data = await api('/api/user/request-reset',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: resetEmail.value }) });
        resetTokenBox.parentElement.classList.add('d-none'); // Hide the token box in production
        resetArea.style.display = 'block';
        alert(data.message); // Tell them to check Gmail
    }catch(err){ alert(err.message||'Could not request token'); }
});

cancelResetBtn?.addEventListener('click',(e)=>{ e.preventDefault(); hideResetOverlay(); });

submitResetBtn?.addEventListener('click', async (e)=>{
    e.preventDefault();
    const token = resetTokenBox.textContent || '';
    const pw = resetPassword.value || '';
    const pw2 = resetPasswordConfirm.value || '';

    hideFeedback(resetStatus);

    if(pw.length < 8) return showFeedback('Password must be at least 8 chars', 'warning', resetStatus);
    if(pw !== pw2) return showFeedback('Passwords do not match', 'warning', resetStatus);
    
    submitResetBtn.disabled = true;
    submitResetBtn.textContent = 'Updating...';

    try{
        await api('/api/user/reset-password',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token, newPassword: pw }) });
        alert('Password reset successful. Please log in.');
        hideResetOverlay();
    }catch(err){ 
        showFeedback(err.message, 'danger', resetStatus); 
    } finally {
        submitResetBtn.disabled = false;
        submitResetBtn.textContent = 'Set Password';
    }
});
</script>
</body>
</html>
